name: NEO Synergy Engine

on:
  push:
    paths:
      - 'apps/*.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  synergy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Run Synergy Engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node engine.js

      - name: Commit synergies
        run: |
          git config user.email "synergy@groupeneo.ch"
          git config user.name "NEO Synergy Engine"
          git add synergies/
          git diff --staged --quiet || git commit -m "feat: nouvelles synergies proposees par Claude [auto]"
          git push
