name: 🧠 NEO Synergy Engine — Claude proposes synergies

on:
  push:
    paths:
      - 'apps/*.json'
  workflow_dispatch:

jobs:
  propose-synergies:
    runs-on: ubuntu-latest
    name: Analyse cross-app et proposition de synergies

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk

      - name: Run Synergy Engine
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cat << 'SCRIPT' > engine.mjs
          import fs from 'fs';
          import path from 'path';
          import Anthropic from '@anthropic-ai/sdk';

          const client = new Anthropic({ apiKey: process.env.ANTHROPIC_API_KEY });

          // Lire tous les manifestes
          const appsDir = './apps';
          const manifests = fs.readdirSync(appsDir)
            .filter(f => f.endsWith('.json'))
            .map(f => JSON.parse(fs.readFileSync(path.join(appsDir, f))));

          // Lire synergies déjà proposées
          const proposedDir = './synergies/proposed';
          const existingFiles = fs.existsSync(proposedDir) ? fs.readdirSync(proposedDir) : [];
          const existingIds = existingFiles.map(f => f.replace('.json',''));
          const nextNum = existingIds.length + 1;
          const nextId = 'SYN-' + String(nextNum).padStart(3,'0');

          console.log(`📋 ${manifests.length} apps analysées | ${existingIds.length} synergies existantes | Prochain ID: ${nextId}`);

          const prompt = `Tu es le NEO Synergy Engine pour le Groupe NEO d'Olivier Neukomm (Suisse).

MANIFESTES APPS:
${JSON.stringify(manifests, null, 2)}

SYNERGIES EXISTANTES (ne pas reproduire): ${existingIds.join(', ')}

Propose 2 NOUVELLES synergies concrètes et chiffrées. Réponds UNIQUEMENT avec un JSON array:
[{
  "id": "${nextId}",
  "status": "proposed",
  "proposed_by": "claude-synergy-engine",
  "proposed_at": "${new Date().toISOString()}",
  "validated_by": null,
  "title": "emoji + titre court",
  "description": "2-3 phrases claires",
  "category": "automation|data_sync|cross_sell|life_event_trigger",
  "priority": "critique|haute|moyenne",
  "effort_estimate": "Xh de code",
  "revenue_impact_chf": 0,
  "revenue_details": "calcul détaillé",
  "source_app": "app-id",
  "source_event": "event.name",
  "target_app": "app-id",
  "target_action": "action",
  "flow": ["étape 1", "étape 2"]
}]`;

          const response = await client.messages.create({
            model: 'claude-opus-4-6',
            max_tokens: 3000,
            messages: [{ role: 'user', content: prompt }]
          });

          const text = response.content[0].text;
          console.log('🧠 Réponse Claude reçue');
          
          const clean = text.replace(/```json
?/g,'').replace(/```
?/g,'').trim();
          let synergies = [];
          try { synergies = JSON.parse(clean); }
          catch(e) {
            const match = text.match(/\[[\s\S]*\]/);
            if (match) synergies = JSON.parse(match[0]);
          }

          if (!fs.existsSync(proposedDir)) fs.mkdirSync(proposedDir, {recursive:true});
          
          for (let i = 0; i < synergies.length; i++) {
            const syn = synergies[i];
            if (!syn.id) syn.id = 'SYN-' + String(nextNum + i).padStart(3,'0');
            const filePath = path.join(proposedDir, syn.id + '.json');
            if (!fs.existsSync(filePath)) {
              fs.writeFileSync(filePath, JSON.stringify(syn, null, 2));
              console.log('✅ Synergie créée:', syn.id, '—', syn.title);
            }
          }
          SCRIPT
          node engine.mjs

      - name: Commit proposed synergies
        run: |
          git config user.email "synergy-engine@groupeneo.ch"
          git config user.name "NEO Synergy Engine 🧠"
          git add synergies/proposed/
          git diff --staged --quiet || git commit -m "🧠 feat(synergies): nouvelles synergies proposées par Claude [auto]"
          git push
